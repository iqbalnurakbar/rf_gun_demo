<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>RF Gun Demo</title>
    <style>
        Make sure body and containers fill viewport and no scrolling on body
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* prevent body scroll */
        }

        /* Make SAPUI5 view container scrollable */
        .sapUiView {
            max-height: 100vh;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch; /* smooth scroll on iOS */
        }

        /* Add this new class for scrolling only current order section */
        .currentOrderSection {
            max-height: 70vh; /* or suitable height */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 1rem;
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{
            "rfgundemo": "./"
        }'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
    ></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        data-name="rfgundemo"
        data-id="container"
        data-settings='{"id" : "rfgundemo"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
